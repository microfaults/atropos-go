services:
  # The main Go service: vegeta-based precision load testing + policy engine.
  archer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ARCHER_ADDR=:8080

  # k6 sidecar: browsing workload (cautious persona).
  # Uses the generic config-driven runner.
  k6-browse:
    build:
      context: ./k6
      dockerfile: Dockerfile.k6
    command: ["run", "/scripts/runner.js"]
    environment:
      - ARCHER_URL=http://archer:8080
      - BASE_URL=${BASE_URL:-http://frontend:8080}
      - FLOW=online-boutique/browse
      - PERSONA=cautious
      - VUS=${BROWSE_VUS:-10}
      - DURATION=${BROWSE_DURATION:-5m}
    depends_on:
      - archer
    restart: "no"

  # k6 sidecar: checkout workload (aggressive persona).
  k6-checkout:
    build:
      context: ./k6
      dockerfile: Dockerfile.k6
    command: ["run", "/scripts/runner.js"]
    environment:
      - ARCHER_URL=http://archer:8080
      - BASE_URL=${BASE_URL:-http://frontend:8080}
      - FLOW=online-boutique/checkout
      - PERSONA=aggressive
      - VUS=${CHECKOUT_VUS:-5}
      - DURATION=${CHECKOUT_DURATION:-5m}
    depends_on:
      - archer
    restart: "no"
