# ---------------------------------------------------------------------------
# atropos-go GitLab CI/CD Pipeline
#
# Stages:
#   check   — Go build, vet, fmt, test, race detection
#   release — Manual version tagging on main / alpha on develop
#   review  — AI code review (schedule/manual/trigger only)
#
# Required CI/CD variables (Settings > CI/CD > Variables):
#   ANTHROPIC_API_KEY — Anthropic API key          [if LLM_PROVIDER=claude]
#   GOOGLE_API_KEY    — Google AI API key          [if LLM_PROVIDER=gemini]
#
# Optional:
#   GITLAB_API_TOKEN  — Project access token (api scope); enables commit comments
#   LLM_PROVIDER      — "claude" (default) or "gemini"
#   LLM_MODEL         — Override model ID
#   REVIEW_PROMPT     — Extra review instructions
#   FROM_COMMIT / TO_COMMIT — Manual review range
#   REVIEW_HOURS      — Hours to look back (default: 24)
#   MAX_DIFF_CHARS    — Max diff chars (default: 120000)
# ---------------------------------------------------------------------------

variables:
  LLM_PROVIDER: "claude"
  LLM_MODEL: ""
  REVIEW_PROMPT: ""
  FROM_COMMIT: ""
  TO_COMMIT: "HEAD"
  REVIEW_HOURS: "24"
  MAX_DIFF_CHARS: "120000"

stages:
  - check
  - release
  - review

# ---------------------------------------------------------------------------
# Go verification
# ---------------------------------------------------------------------------

.go-base:
  image: golang:1.25
  variables:
    GOMODCACHE: ${CI_PROJECT_DIR}/.gomodcache
    GOCACHE: ${CI_PROJECT_DIR}/.gocache
  cache:
    key: go-${CI_COMMIT_REF_SLUG}
    paths:
      - .gomodcache
      - .gocache

go-verify:
  extends: .go-base
  stage: check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - |
      unformatted=$(gofmt -l .)
      if [ -n "$unformatted" ]; then
        echo "These files need gofmt:"
        echo "$unformatted"
        exit 1
      fi
    - go vet ./...
    - go build ./...
    - go test -count=1 ./...

go-race:
  extends: .go-base
  stage: check
  variables:
    CGO_ENABLED: "1"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - go test -race -count=1 ./...

go-integration:
  extends: .go-base
  stage: check
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  before_script:
    - git clone --depth 1 --branch develop
        https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/microfaults/manteion-go.git
        ../manteion-go
  script:
    - go build ./...
    - go test -count=1 ./...
    - cd ../manteion-go
    - go build ./...

# ---------------------------------------------------------------------------
# Release — manual version tagging
# ---------------------------------------------------------------------------

release-tag:
  stage: release
  image: alpine:3.22
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
  before_script:
    - apk add --no-cache git
  script:
    - |
      LATEST=$(git tag --sort=-version:refname | head -1)
      if [ -z "$LATEST" ]; then
        LATEST="v0.0.0"
      fi
      MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
      MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
      PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3 | cut -d- -f1)
      NEXT_PATCH=$((PATCH + 1))
      NEW_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
      echo "Latest tag: $LATEST"
      echo "New tag: $NEW_TAG"
      git tag "$NEW_TAG"
      git push origin "$NEW_TAG"
      echo "TAG=$NEW_TAG" >> release.env
  artifacts:
    reports:
      dotenv: release.env

release-alpha:
  stage: release
  image: alpine:3.22
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
      allow_failure: true
  before_script:
    - apk add --no-cache git
  script:
    - |
      LATEST=$(git tag --sort=-version:refname | grep -v alpha | head -1)
      if [ -z "$LATEST" ]; then
        LATEST="v0.0.0"
      fi
      MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
      MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
      PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3 | cut -d- -f1)
      NEXT_PATCH=$((PATCH + 1))
      SHORT_SHA=$(git rev-parse --short HEAD)
      NEW_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}-alpha.${SHORT_SHA}"
      echo "Latest stable tag: $LATEST"
      echo "New alpha tag: $NEW_TAG"
      git tag "$NEW_TAG"
      git push origin "$NEW_TAG"
      echo "TAG=$NEW_TAG" >> release.env
  artifacts:
    reports:
      dotenv: release.env

# ---------------------------------------------------------------------------
# AI code review (schedule/manual/trigger only)
# ---------------------------------------------------------------------------

ai-review:
  stage: review
  image: python:3.12-slim
  allow_failure: true
  retry:
    max: 2
    when: script_failure
  timeout: 15m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
  artifacts:
    name: "ai-review-$CI_COMMIT_SHORT_SHA"
    paths:
      - review-output/
    expire_in: 30 days
    when: always
  before_script:
    - apt-get update -qq && apt-get install -y -qq git > /dev/null
  script:
    - python3 scripts/ai-review.py
