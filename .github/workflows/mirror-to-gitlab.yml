# ---------------------------------------------------------------------------
# Mirror to GitLab — Push merged branches to UCSC GitLab
#
# Triggers on push to main/develop (i.e., when a PR is merged on GitHub).
# Pushes the same commit to the corresponding branch on GitLab.
#
# No infinite loop: GitLab CI will trigger but its push back here is a no-op
# because the commit already exists on GitHub (ref unchanged → no event).
#
# Required GitHub Secrets:
#   GITLAB_PUSH_TOKEN — GitLab personal access token with write_repository scope
# ---------------------------------------------------------------------------

name: Mirror to GitLab
on:
  push:
    branches: [main, develop]

jobs:
  mirror:
    runs-on: ubuntu-latest
    # 1. Skip if the actor is a bot
    # 2. Skip if the commit message contains [skip ci] (sent from GitLab)
    if: |
      github.actor != 'gitlab-mirror-bot' && 
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'Gitlab github sync')

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@git.ucsc.edu/microfaults/atropos-go.git"
          # Use '-o ci.skip' which is a GitLab-specific push option to skip the next pipeline
          git push gitlab "${{ github.ref_name }}" --force -o ci.skip
          echo "✅ Pushed to GitLab with skip-ci flag."

